name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      # `--continue` (set in the root package.json scripts) makes these report
      # EVERY failing workspace in one run. Without it turbo aborts on the first
      # failure, which is how a non-compiling apps/web hid behind apps/mobile:
      # you fix one, re-run, and only then discover the next.
      #
      # Each step is `if: always()` so one red step does not mask the others —
      # a single CI run should show the complete picture, not the first problem.
      - name: Lint
        if: always()
        run: pnpm lint

      - name: Type check
        if: always()
        run: pnpm type-check

      - name: Test
        if: always()
        run: pnpm test

      - name: Build
        if: always()
        run: pnpm build
