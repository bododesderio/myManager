      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#7F77DD" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="#f5f4ef"/>
