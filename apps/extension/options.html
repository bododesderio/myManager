<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>myManager · Settings</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; max-width: 480px; margin: 0 auto; }
      h1 { font-size: 18px; margin: 0 0 16px; }
      label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-top: 16px; margin-bottom: 4px; }
      input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
      button { background: #7F77DD; color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 20px; }
      .hint { font-size: 12px; color: #999; margin-top: 4px; }
      .success { color: #10b981; font-size: 13px; margin-top: 12px; }
    </style>
  </head>
  <body>
    <h1>myManager — Extension Settings</h1>
    <label for="apiBaseUrl">API base URL</label>
    <input id="apiBaseUrl" placeholder="https://api.mymanager.app/api/v1" />
    <div class="hint">Use http://localhost:3001/api/v1 for local development.</div>

    <label for="token">API token (Bearer)</label>
    <input id="token" type="password" placeholder="eyJ…" />
    <div class="hint">Generate one in Settings → API Keys in the web app.</div>

    <label for="workspaceId">Workspace ID</label>
    <input id="workspaceId" placeholder="uuid" />

    <button id="saveBtn">Save</button>
    <div id="message"></div>
    <script src="options.js"></script>
  </body>
</html>
