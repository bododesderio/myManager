<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>myManager</title>
    <style>
      body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; margin: 0; }
      h1 { font-size: 14px; margin: 0 0 12px; color: #1a1a1a; }
      textarea { width: 100%; min-height: 100px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; padding: 8px; font-size: 13px; resize: vertical; }
      button { background: #7F77DD; color: #fff; border: none; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .small { font-size: 11px; color: #999; margin-top: 4px; text-align: right; }
      .error { color: #f44336; font-size: 12px; margin-top: 8px; }
      .success { color: #10b981; font-size: 12px; margin-top: 8px; }
      a { color: #7F77DD; font-size: 11px; }
    </style>
  </head>
  <body>
    <h1>Save to myManager</h1>
    <textarea id="caption" placeholder="What would you like to save?"></textarea>
    <div class="small"><span id="charCount">0</span> characters</div>
    <button id="saveBtn">Save as draft</button>
    <div id="message"></div>
    <div style="margin-top:12px;"><a href="#" id="optionsLink">Settings</a></div>
    <script src="popup.js"></script>
  </body>
</html>
