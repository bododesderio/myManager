services:
  postgres:
    image: postgres:16-alpine
    container_name: mymanager-postgres
    environment:
      POSTGRES_USER: mymanager
      POSTGRES_PASSWORD: mymanager_dev
      POSTGRES_DB: mymanager_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mymanager"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mymanager-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mymanager-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://mymanager:mymanager_dev@postgres:5432/mymanager_dev
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://web:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: mymanager-web
    env_file:
      - .env
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production-min-32-chars!!}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: http://localhost:3000
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.worker
    container_name: mymanager-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://mymanager:mymanager_dev@postgres:5432/mymanager_dev
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node.*worker-main' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
